<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>团队名片 - 选择联系人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin: 20px 0;
            font-size: 28px;
        }
        .sub {
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .person-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .person-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .person-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .avatar {
            font-size: 52px;
            background: #f3f4f6;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info {
            flex: 1;
        }
        .name {
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
        }
        .title {
            font-size: 14px;
            color: #6b7280;
            margin: 4px 0;
        }
        .status-badge {
            display: inline-block;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }
        .status-online {
            background: #dcfce7;
            color: #16a34a;
        }
        .status-offline {
            background: #f3f4f6;
            color: #6b7280;
        }
        .arrow {
            color: #9ca3af;
            font-size: 20px;
        }

        /* 名片详情页样式 */
        .detail-card {
            background: white;
            border-radius: 36px;
            padding: 32px 24px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .detail-avatar {
            font-size: 80px;
            text-align: center;
            margin-bottom: 12px;
        }
        .detail-name {
            text-align: center;
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .detail-status {
            text-align: center;
            margin-bottom: 28px;
        }
        .section {
            margin: 24px 0;
        }
        .section h3 {
            color: #374151;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tags span {
            background: #e5e7eb;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
        }
        .contact-item {
            background: #f9fafb;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 列表页 -->
        <div id="listView">
            <h1>👥 联系我们</h1>
            <div class="sub">点击头像查看详细名片</div>
            <div class="person-list" id="personList"></div>
        </div>

        <!-- 详情页（初始隐藏） -->
        <div id="detailView" class="hidden"></div>
    </div>

    <script>
        // ========== 人员数据（在这里增删改） ==========
        const persons = [
            {
                id: 1,
                name: "李明",
                avatar: "🧑‍💻",
                title: "技术总监",
                role: "全栈架构师",
                intro: "10年经验，擅长系统架构设计和技术团队管理，曾负责多个千万级项目。",
                expertise: ["Java", "Spring Cloud", "架构设计", "团队管理", "K8s"],
                phone: "13812345678",
                email: "liming@example.com",
                wechat: "liming_tech",
                workTime: "周一至周五 9:00-21:00",
                // 在线时段配置
                onlineHours: { weekdays: [9,21], weekend: [10,18] }
            },
            {
                id: 2,
                name: "王芳",
                avatar: "👩‍🎨",
                title: "UI/UX 设计专家",
                role: "资深设计师",
                intro: "8年设计经验，主导过30+款产品的UI设计，擅长用户研究和交互设计。",
                expertise: ["Figma", "Sketch", "UI设计", "交互设计", "用户研究"],
                phone: "13987654321",
                email: "wangfang@example.com",
                wechat: "wangfang_design",
                workTime: "周一至周五 10:00-19:00",
                onlineHours: { weekdays: [10,19], weekend: [10,17] }
            },
            {
                id: 3,
                name: "张伟",
                avatar: "⚙️",
                title: "后端开发工程师",
                role: "Java专家",
                intro: "5年后端开发，专注高并发和性能优化，熟悉微服务架构。",
                expertise: ["Java", "Spring Boot", "MySQL", "Redis", "RocketMQ"],
                phone: "13712349876",
                email: "zhangwei@example.com",
                wechat: "zhangwei_backend",
                workTime: "周一至周五 9:00-20:00",
                onlineHours: { weekdays: [9,20], weekend: [10,18] }
            },
            {
                id: 4,
                name: "陈璐",
                avatar: "🖥️",
                title: "前端开发工程师",
                role: "Vue/React专家",
                intro: "4年前端经验，精通主流框架，追求极致用户体验和代码质量。",
                expertise: ["Vue3", "React", "TypeScript", "Node.js", "小程序"],
                phone: "15612347890",
                email: "chenlu@example.com",
                wechat: "chenlu_frontend",
                workTime: "周一至周五 10:00-19:00",
                onlineHours: { weekdays: [10,19], weekend: [11,17] }
            }
        ];

        // ========== 辅助函数 ==========
        function showToast(msg) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制');
            });
        }

        // 判断某人当前是否在线
        function isPersonOnline(person) {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            const hours = person.onlineHours;
            
            if (day >= 1 && day <= 5) {
                // 工作日
                return hour >= hours.weekdays[0] && hour < hours.weekdays[1];
            } else {
                // 周末
                return hour >= hours.weekend[0] && hour < hours.weekend[1];
            }
        }

        // ========== 渲染列表 ==========
        function renderList() {
            const container = document.getElementById('personList');
            container.innerHTML = persons.map(person => {
                const isOnline = isPersonOnline(person);
                const statusClass = isOnline ? 'status-online' : 'status-offline';
                const statusText = isOnline ? '🟢 在线' : '⚫ 离线';
                
                return `
                    <div class="person-card" onclick="showDetail(${person.id})">
                        <div class="avatar">${person.avatar}</div>
                        <div class="info">
                            <div class="name">${person.name}</div>
                            <div class="title">${person.title}</div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="arrow">›</div>
                    </div>
                `;
            }).join('');
        }

        // ========== 渲染详情页 ==========
        window.showDetail = function(id) {
            const person = persons.find(p => p.id === id);
            if (!person) return;
            
            const isOnline = isPersonOnline(person);
            const statusClass = isOnline ? 'status-dot online' : 'status-dot offline';
            const statusText = isOnline ? '🟢 当前在线' : '⚫ 当前离线 (可留言)';
            
            const detailHtml = `
                <button class="back-btn" onclick="backToList()">← 返回列表</button>
                <div class="detail-card">
                    <div class="detail-avatar">${person.avatar}</div>
                    <div class="detail-name">${person.name}</div>
                    <div class="detail-status">
                        <div class="status" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                            <span class="${statusClass}" style="width:10px;height:10px;border-radius:50%;"></span>
                            <span>${statusText}</span>
                        </div>
                        <div style="font-size:14px;color:#6b7280;margin-top:4px;">${person.title}</div>
                    </div>
                    
                    <div class="section">
                        <h3>📌 关于我</h3>
                        <p>${person.intro}</p>
                    </div>
                    
                    <div class="section">
                        <h3>🔥 精通领域</h3>
                        <div class="tags">
                            ${person.expertise.map(skill => `<span>${skill}</span>`).join('')}
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3>📞 联系方式</h3>
                        <div class="contact-item" onclick="copyText('${person.phone}')">
                            📱 电话: ${person.phone.slice(0,3)}****${person.phone.slice(-4)}
                            <span class="copy-hint">点击复制</span>
                        </div>
                        <div class="contact-item" onclick="copyText('${person.email}')">
                            📧 邮箱: ${person.email}
                            <span class="copy-hint">点击复制</span>
                        </div>
                        <div class="contact-item" onclick="copyText('${person.wechat}')">
                            💬 微信: ${person.wechat}
                            <span class="copy-hint">点击复制</span>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3>⏰ 服务时间</h3>
                        <p>${person.workTime}</p>
                    </div>
                    
                    <button class="btn" onclick="window.location.href='tel:${person.phone}'">📞 立即联系</button>
                </div>
            `;
            
            document.getElementById('detailView').innerHTML = detailHtml;
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
        };
        
        window.backToList = function() {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('detailView').classList.add('hidden');
        };
        
        // 每分钟更新一次在线状态（刷新列表）
        function startStatusRefresh() {
            renderList();
            setInterval(() => {
                renderList();
                // 如果当前在详情页，也刷新详情页的状态显示
                const detailView = document.getElementById('detailView');
                if (!detailView.classList.contains('hidden')) {
                    // 获取当前显示的人名（简单处理：重新触发当前详情）
                    const nameEl = detailView.querySelector('.detail-name');
                    if (nameEl) {
                        const currentName = nameEl.innerText;
                        const person = persons.find(p => p.name === currentName);
                        if (person) window.showDetail(person.id);
                    }
                }
            }, 60000);
        }
        
        // 初始化
        renderList();
        startStatusRefresh();
    </script>
</body>
</html>
